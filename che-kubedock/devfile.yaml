schemaVersion: 2.3.0
metadata:
  name: WeeboDevImageKubedock

components:
- name: tools
  container:
    image: ghcr.io/batleforc/weebodevimage/che-min-mise:main
    memoryLimit: 8Gi
    memoryRequest: 1Gi
    cpuLimit: "2"
    cpuRequest: "500m"
    mountSources: true
    endpoints:
    - name: base
      targetPort: 5437
      exposure: public
      protocol: https
      secure: true
    env:
    - name: ENV
      value: "dev-che"
    - name: "PORT"
      value: "5437"
    - name: DOCKER_HOST
      value: "tcp://localhost:2475"
    - name: TESTCONTAINERS_RYUK_DISABLED
      value: "true"
- name: kubedock
  container:
    image: ghcr.io/batleforc/weebodevimage/che-kubedock:main
    memoryLimit: 512Mi
    memoryRequest: 128Mi
    cpuLimit: "1"
    cpuRequest: 100m
    mountSources: false
    endpoints:
    - name: docker
      targetPort: 2475
      exposure: internal
      protocol: http
