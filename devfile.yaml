schemaVersion: 2.3.0
metadata:
  name: WeeboDevImage
  language: golang
  version: 1.0.0

components:
- name: tools
  container:
    image: ghcr.io/batleforc/weebodevimage/che-golang:main
    memoryLimit: 2Gi
    mountSources: true
- name: devtool
  container:
    image: buildpack-deps:bookworm
    memoryLimit: 1Gi
    mountSources: false
    command: ['tail']
    args: ['-f', '/dev/null']
- name: browser
  container:
    image: ghcr.io/batleforc/weebodevimage/che-browser:main
    memoryLimit: 3Gi
    mountSources: false
    endpoints:
    - name: novnc
      targetPort: 6080
      exposure: public
      protocol: https
      secure: true
    - name: cdp
      targetPort: 9222
      exposure: internal
      protocol: http
    - name: webdriver
      targetPort: 9515
      exposure: internal
      protocol: http
