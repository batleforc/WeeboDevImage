schemaVersion: 2.3.0
metadata:
  name: WeeboDevImageMailpit

components:
- name: tools
  container:
    image: ghcr.io/batleforc/weebodevimage/che-min-mise:main
    memoryLimit: 8Gi
    memoryRequest: 1Gi
    cpuLimit: "2"
    cpuRequest: "500m"
    mountSources: true
    endpoints:
    - name: base
      targetPort: 5437
      exposure: public
      protocol: https
      secure: true
    env:
    - name: ENV
      value: "dev-che"
    - name: "PORT"
      value: "5437"
    - name: SMTP_HOST
      value: "localhost"
    - name: SMTP_PORT
      value: "1025"
- name: mailpit
  container:
    image: ghcr.io/batleforc/weebodevimage/che-mailpit:main
    memoryLimit: 256Mi
    memoryRequest: 64Mi
    cpuLimit: "1"
    cpuRequest: 100m
    mountSources: false
    endpoints:
    - name: smtp
      targetPort: 1025
      exposure: internal
      protocol: tcp
    - name: mailpit-ui
      targetPort: 8025
      exposure: public
      protocol: https
      secure: true
