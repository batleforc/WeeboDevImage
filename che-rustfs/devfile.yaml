schemaVersion: 2.3.0
metadata:
  name: WeeboDevImageRustFS

components:
- name: tools
  container:
    image: ghcr.io/batleforc/weebodevimage/che-min-mise:main
    memoryLimit: 8Gi
    memoryRequest: 1Gi
    cpuLimit: "2"
    cpuRequest: "500m"
    mountSources: true
    endpoints:
    - name: base
      targetPort: 5437
      exposure: public
      protocol: https
      secure: true
    env:
    - name: ENV
      value: "dev-che"
    - name: "PORT"
      value: "5437"
    - name: AWS_ENDPOINT_URL
      value: "http://localhost:9000"
    - name: AWS_ACCESS_KEY_ID
      value: "rustfsadmin"
    - name: AWS_SECRET_ACCESS_KEY
      value: "rustfsadmin"
- name: rustfs
  container:
    image: ghcr.io/batleforc/weebodevimage/che-rustfs:main
    memoryLimit: 1Gi
    memoryRequest: 256Mi
    cpuLimit: "1"
    cpuRequest: 100m
    mountSources: false
    endpoints:
    - name: s3
      targetPort: 9000
      exposure: internal
      protocol: http
    - name: rustfs-console
      targetPort: 9001
      exposure: public
      protocol: https
      secure: true
