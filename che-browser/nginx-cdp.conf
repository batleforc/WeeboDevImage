# CDP proxy: 0.0.0.0:9222 -> headed Chrome on 127.0.0.1:9229.
# Headed Chrome binds CDP to loopback only, rejects non-IP/localhost Host headers,
# and derives webSocketDebuggerUrl from the Host it received — so we rewrite Host
# inbound and rewrite the ws:// URL back to the client-visible host outbound.
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
worker_processes 1;

events {
  worker_connections 128;
}

http {
  access_log off;
  client_body_temp_path /tmp/nginx-body;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 9222;

    location / {
      proxy_pass http://127.0.0.1:9229;
      proxy_http_version 1.1;
      proxy_set_header Host localhost;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      # sub_filter cannot rewrite compressed responses
      proxy_set_header Accept-Encoding "";
      sub_filter_types application/json;
      sub_filter 'ws://localhost/' 'ws://$http_host/';
      sub_filter_once off;
      proxy_read_timeout 86400;
    }
  }
}
