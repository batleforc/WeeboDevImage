name: Upgrade MinSpace

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: batleforc
      repository: WeeboDevImage
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      branch: main

sources:
  kubectl:
    kind: http
    spec:
      url: "https://dl.k8s.io/release/stable.txt"
  nvm:
    kind: githubrelease
    scmid: default
    spec:
      owner: nvm-sh
      repository: nvm
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      versionFilter:
        kind: semver
  node:
    kind: githubrelease
    scmid: default
    spec:
      owner: nodejs
      repository: node
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      versionFilter:
        kind: semver
    transformers:
    - trimprefix: "v"

targets:
  bump_kubectl_version:
    kind: yaml
    name: "Bump kubectl version"
    scmid: default
    sourceid: kubectl
    spec:
      file: versions.yaml
      key: $.min.kubectl
  bump_nvm_version:
    kind: yaml
    name: "Bump nvm version"
    scmid: default
    sourceid: nvm
    spec:
      file: versions.yaml
      key: $.min.nvm
  bump_node_version:
    kind: yaml
    name: "Bump node version"
    scmid: default
    sourceid: node
    spec:
      file: versions.yaml
      key: $.min.node

actions:
  bump_min_space:
    kind: github/pullrequest
    scmid: default
    spec:
      title: 'ci: Bump Min Space'
      automerge: false
