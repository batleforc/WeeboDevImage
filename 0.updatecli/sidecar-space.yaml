name: Upgrade SidecarSpace

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: batleforc
      repository: WeeboDevImage
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      branch: main

sources:
  mailpit:
    kind: githubrelease
    spec:
      owner: axllent
      repository: mailpit
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      versionfilter:
        kind: semver
  rustfs:
    kind: githubrelease
    spec:
      owner: rustfs
      repository: rustfs
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      # rustfs only publishes prereleases (1.0.0-beta.N) for now
      typefilter:
        prerelease: true
      versionfilter:
        kind: latest
  lgtm:
    kind: dockerimage
    spec:
      image: grafana/otel-lgtm
      versionfilter:
        kind: semver

targets:
  bump_mailpit_version:
    kind: yaml
    name: "Bump Mailpit version"
    scmid: default
    sourceid: mailpit
    spec:
      file: versions.yaml
      key: $.sidecar.mailpit
  bump_rustfs_version:
    kind: yaml
    name: "Bump RustFS version"
    scmid: default
    sourceid: rustfs
    spec:
      file: versions.yaml
      key: $.sidecar.rustfs
  bump_lgtm_version:
    kind: yaml
    name: "Bump otel-lgtm version"
    scmid: default
    sourceid: lgtm
    spec:
      file: versions.yaml
      key: $.sidecar.lgtm

actions:
  bump_sidecar_space:
    kind: github/pullrequest
    scmid: default
    spec:
      title: 'ci: Bump Sidecar Space'
      automerge: false
