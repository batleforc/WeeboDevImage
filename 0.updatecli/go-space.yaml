name: Upgrade GoSpace

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: batleforc
      repository: WeeboDevImage
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      branch: main

sources:
  golang:
    kind: githubrelease
    scmid: default
    spec:
      owner: golang
      repository: go
      token: "{{ requiredEnv .github.token }}"
      username: "{{ .github.username }}"
      versionFilter:
        kind: latest
    transformers:
    - trimprefix: "go"

targets:
  bump_go_version:
    kind: yaml
    name: "Bump Golang version"
    scmid: default
    sourceid: golang
    spec:
      file: versions.yaml
      key: $.golang.version

actions:
  bump_go_space:
    kind: github/pullrequest
    scmid: default
    spec:
      title: 'ci: Bump Go Space'
      automerge: false
