schemaVersion: 2.2.0
metadata:
  name: WeeboDevImageMise

components:
- name: tools
  container:
    image: ghcr.io/batleforc/weebodevimage/che-mise:main
    memoryLimit: 8Gi
    memoryRequest: 1Gi
    cpuLimit: "2"
    cpuRequest: "500m"
    mountSources: true
    endpoints:
    - name: mise
      targetPort: 5437
      exposure: public
      protocol: https
      secure: true
    env:
    - name: ENV
      value: "dev-che"
    - name: "PORT"
      value: "5437"