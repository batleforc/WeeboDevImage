name: Build docker image

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 06 * * *"

concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-templates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          curl -fsSLo /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
      - name: Check rendered files drift
        id: render_check
        run: |
          if bash scripts/render.sh --check; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Render files
        if: steps.render_check.outputs.drift == 'true'
        run: bash scripts/render.sh
      - name: Create PR with rendered files
        if: steps.render_check.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: render generated files"
          branch: "chore/render-generated-files"
          delete-branch: true
          title: "chore: sync generated files with templates"
          body: |
            This PR was created automatically by CI because rendered files diverged from templates.
            It regenerates files using `bash scripts/render.sh`.
            Please review and merge this PR, then ensure local changes are rendered before future commits by running `task render` (or `bash scripts/render.sh`) before pushing.
            Affected files are included in this PR commit.
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Fail when drift is detected
        if: steps.render_check.outputs.drift == 'true'
        run: |
          echo "Rendered files diverged from templates. An automated PR has been created or updated with the required updates."
          exit 1

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix_min: ${{ steps.build-matrices.outputs.matrix_min }}
      matrix_base: ${{ steps.build-matrices.outputs.matrix_base }}
      matrix_images: ${{ steps.build-matrices.outputs.matrix_images }}
      branch: ${{ steps.extract_branch.outputs.branch }}
      registry: ${{ steps.extract_registry.outputs.registry }}
      registry_host: ${{ steps.extract_registry.outputs.registry_host }}
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          curl -fsSLo /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
      - name: Extract registry
        id: extract_registry
        run: |
          REGISTRY=$(yq e '.registry' versions.yaml)
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "registry_host=$(echo ${REGISTRY} | cut -d'/' -f1)" >> $GITHUB_OUTPUT
      - name: Build matrices
        id: build-matrices
        run: |
          ALL=$(find . -name 'Containerfile' -print | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix_min=$(echo $ALL   | jq -c 'map(select(test("/che-min/")))')"   >> $GITHUB_OUTPUT
          echo "matrix_base=$(echo $ALL  | jq -c 'map(select(test("/che-base/")))')"  >> $GITHUB_OUTPUT
          echo "matrix_images=$(echo $ALL | jq -c 'map(select(test("/che-min/|/che-base/") | not))')" >> $GITHUB_OUTPUT
      - name: Show matrices
        run: |
          echo "min:    ${{ steps.build-matrices.outputs.matrix_min }}"
          echo "base:   ${{ steps.build-matrices.outputs.matrix_base }}"
          echo "images: ${{ steps.build-matrices.outputs.matrix_images }}"
      - name: Extract branch name
        id: extract_branch
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

  build-min:
    runs-on: ubuntu-latest
    needs: [prepare, lint-templates]
    strategy:
      matrix:
        manifest: ${{ fromJson(needs.prepare.outputs.matrix_min) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ needs.prepare.outputs.registry_host }}
          username: ${{ secrets.REGISTRY_USERNAME || github.repository_owner }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}
      - name: Extract folder name
        id: extract_folder
        shell: bash
        run: IFS="/" read -ra strarr <<<"${{ matrix.manifest }}" && echo "folder=${strarr[1]}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.extract_folder.outputs.folder }}
          file: ${{ matrix.manifest }}
          push: true
          sbom: true
          tags: |
            ${{ needs.prepare.outputs.registry }}/${{ steps.extract_folder.outputs.folder }}:${{ needs.prepare.outputs.branch }}

  build-base:
    runs-on: ubuntu-latest
    needs: [prepare, build-min]
    strategy:
      matrix:
        manifest: ${{ fromJson(needs.prepare.outputs.matrix_base) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ needs.prepare.outputs.registry_host }}
          username: ${{ secrets.REGISTRY_USERNAME || github.repository_owner }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}
      - name: Extract folder name
        id: extract_folder
        shell: bash
        run: IFS="/" read -ra strarr <<<"${{ matrix.manifest }}" && echo "folder=${strarr[1]}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.extract_folder.outputs.folder }}
          file: ${{ matrix.manifest }}
          push: true
          sbom: true
          tags: |
            ${{ needs.prepare.outputs.registry }}/${{ steps.extract_folder.outputs.folder }}:${{ needs.prepare.outputs.branch }}

  build-image:
    runs-on: ubuntu-latest
    needs: [prepare, build-base]
    strategy:
      matrix:
        manifest: ${{ fromJson(needs.prepare.outputs.matrix_images) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ needs.prepare.outputs.registry_host }}
          username: ${{ secrets.REGISTRY_USERNAME || github.repository_owner }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}
      - name: Extract folder name
        id: extract_folder
        shell: bash
        run: IFS="/" read -ra strarr <<<"${{ matrix.manifest }}" && echo "folder=${strarr[1]}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.extract_folder.outputs.folder }}
          file: ${{ matrix.manifest }}
          push: true
          sbom: true
          tags: |
            ${{ needs.prepare.outputs.registry }}/${{ steps.extract_folder.outputs.folder }}:${{ needs.prepare.outputs.branch }}

  report-sizes:
    runs-on: ubuntu-latest
    needs: [prepare, build-min, build-base, build-image]
    permissions:
      packages: read
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.5

      - name: Authenticate crane against GHCR
        run: |
          crane auth login ghcr.io \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Collect image sizes
        id: collect
        env:
          REGISTRY: ${{ needs.prepare.outputs.registry }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
        run: |
          TABLE="| Image | Taille compressée |\n|---|---|\n"

          while IFS= read -r containerfile; do
            folder=$(echo "$containerfile" | cut -d'/' -f2)
            IMAGE="${REGISTRY}/${folder}:${BRANCH}"

            # --platform linux/amd64 résout l'OCI index créé par SBOM
            BYTES=$(crane manifest --platform linux/amd64 "${IMAGE}" \
              | jq '[.layers[].size] | add // 0')

            HUMAN=$(numfmt --to=iec "${BYTES}")
            TABLE+="| \`${folder}\` | ${HUMAN} |\n"
          done < <(find . -name 'Containerfile' -print | sort)

          {
            echo "table<<REPORT_EOF"
            printf '%b' "${TABLE}"
            echo "REPORT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write job summary
        env:
          SIZE_TABLE: ${{ steps.collect.outputs.table }}
        run: |
          {
            echo "## Image Compressed Sizes"
            echo ""
            printf '%b' "${SIZE_TABLE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post commit comment
        uses: actions/github-script@v9
        env:
          SIZE_TABLE: ${{ steps.collect.outputs.table }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const table = process.env.SIZE_TABLE;
            const body = `## Image Compressed Sizes\n\n${table}`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: context.sha,
              body,
            });
