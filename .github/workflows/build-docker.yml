name: Build docker image

on:
  push:
    branches: ["main"]

jobs:
  lint-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          curl -fsSLo /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
      - name: Verify Containerfiles match templates
        run: bash scripts/render.sh --check

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix_min: ${{ steps.build-matrices.outputs.matrix_min }}
      matrix_base: ${{ steps.build-matrices.outputs.matrix_base }}
      matrix_images: ${{ steps.build-matrices.outputs.matrix_images }}
      branch: ${{ steps.extract_branch.outputs.branch }}
      repository: ${{ steps.extract_repo.outputs.repository }}
    steps:
      - uses: actions/checkout@v6
      - name: Build matrices
        id: build-matrices
        run: |
          ALL=$(find . -name 'Containerfile' -print | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix_min=$(echo $ALL   | jq -c 'map(select(test("/che-min/")))')"   >> $GITHUB_OUTPUT
          echo "matrix_base=$(echo $ALL  | jq -c 'map(select(test("/che-base/")))')"  >> $GITHUB_OUTPUT
          echo "matrix_images=$(echo $ALL | jq -c 'map(select(test("/che-min/|/che-base/") | not))')" >> $GITHUB_OUTPUT
      - name: Show matrices
        run: |
          echo "min:    ${{ steps.build-matrices.outputs.matrix_min }}"
          echo "base:   ${{ steps.build-matrices.outputs.matrix_base }}"
          echo "images: ${{ steps.build-matrices.outputs.matrix_images }}"
      - name: Extract branch name
        id: extract_branch
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
      - name: Extract repo name
        id: extract_repo
        shell: bash
        run: echo "repository=${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT

  build-min:
    runs-on: ubuntu-latest
    needs: [prepare, lint-templates]
    strategy:
      matrix:
        manifest: ${{ fromJson(needs.prepare.outputs.matrix_min) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract folder name
        id: extract_folder
        shell: bash
        run: IFS="/" read -ra strarr <<<"${{ matrix.manifest }}" && echo "folder=${strarr[1]}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.extract_folder.outputs.folder }}
          file: ${{ matrix.manifest }}
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ needs.prepare.outputs.repository }}/${{ steps.extract_folder.outputs.folder }}:${{ needs.prepare.outputs.branch }}

  build-base:
    runs-on: ubuntu-latest
    needs: [prepare, build-min]
    strategy:
      matrix:
        manifest: ${{ fromJson(needs.prepare.outputs.matrix_base) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract folder name
        id: extract_folder
        shell: bash
        run: IFS="/" read -ra strarr <<<"${{ matrix.manifest }}" && echo "folder=${strarr[1]}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.extract_folder.outputs.folder }}
          file: ${{ matrix.manifest }}
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ needs.prepare.outputs.repository }}/${{ steps.extract_folder.outputs.folder }}:${{ needs.prepare.outputs.branch }}

  build-image:
    runs-on: ubuntu-latest
    needs: [prepare, build-base]
    strategy:
      matrix:
        manifest: ${{ fromJson(needs.prepare.outputs.matrix_images) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract folder name
        id: extract_folder
        shell: bash
        run: IFS="/" read -ra strarr <<<"${{ matrix.manifest }}" && echo "folder=${strarr[1]}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.extract_folder.outputs.folder }}
          file: ${{ matrix.manifest }}
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ needs.prepare.outputs.repository }}/${{ steps.extract_folder.outputs.folder }}:${{ needs.prepare.outputs.branch }}
