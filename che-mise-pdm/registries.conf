# /etc/containers/registries.conf  (che-min-mise-podman)
# All image pulls go through the internal Angos pull-through cache on
# weebo.poc. Egress is locked down (toFQDNs -> angos.weebo.poc), so the
# mirror is effectively the only reachable source.
#
# NOTE 1 (path scheme): adjust the mirror `location` to Angos's actual
#   pull-through URL scheme (per-upstream prefix vs transparent mirror).
# NOTE 2 (TLS): angos.weebo.poc uses the internal CA. Trust comes from the
#   CA bundle injected at runtime by the mutating webhook (system trust store).
#   No per-registry cert needed in the image.
# NOTE 3 (auth): authentication to Angos uses the workspace's projected K8s SA
#   token (OIDC) at runtime — handled via a credential helper / auth.json, not
#   baked here.

unqualified-search-registries = ["docker.io"]

[[registry]]
prefix   = "docker.io"
location = "docker.io"
  [[registry.mirror]]
  location = "angos.weebo.poc/docker.io"

[[registry]]
prefix   = "ghcr.io"
location = "ghcr.io"
  [[registry.mirror]]
  location = "angos.weebo.poc/ghcr.io"

[[registry]]
prefix   = "quay.io"
location = "quay.io"
  [[registry.mirror]]
  location = "angos.weebo.poc/quay.io"

[[registry]]
prefix   = "registry.k8s.io"
location = "registry.k8s.io"
  [[registry.mirror]]
  location = "angos.weebo.poc/registry.k8s.io"