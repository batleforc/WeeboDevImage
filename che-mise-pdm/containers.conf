# /etc/containers/containers.conf  (che-min-mise-podman)
# Engine + network config for rootless build/run inside a Che workspace pod.
# Storage is handled per-user by the inherited entrypoint (storage.conf).

[containers]
  # Capabilities granted to NESTED containers (bounded by the pod's own caps
  # in rootless mode anyway). Mirrors the former che-base set.
  default_capabilities = [
    "CHOWN",
    "DAC_OVERRIDE",
    "FOWNER",
    "FSETID",
    "KILL",
    "NET_BIND_SERVICE",
    "SETFCAP",
    "SETGID",
    "SETPCAP",
    "SETUID",
    "SYS_CHROOT"
  ]

[engine]
  # No systemd in the workspace container -> cgroupfs, file-based events.
  cgroup_manager = "cgroupfs"
  events_logger  = "file"
  # crun is lighter/faster than runc for nested container cold start.
  runtime = "crun"

[network]
  network_backend = "netavark"
  # Rootless host<->namespace connectivity: pasta (modern default, perf +
  # transparent pod-IP). Switch to "slirp4netns" as a fallback if pasta
  # misbehaves in the nested-userns-in-pod setup.
  default_rootless_network_cmd = "pasta"